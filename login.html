<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="resources/twitter.3.ico">
    <title>Login / X</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="light">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);">
        <div style="background:var(--card);padding:32px 28px;border-radius:24px;max-width:380px;width:100%;box-shadow:0 0 0 1px var(--border);text-align:center;">
            <div style="margin-bottom:24px;">
                <i class="fa-brands fa-x-twitter" style="font-size:32px;"></i>
            </div>
            <h1 style="font-size:24px;margin-bottom:8px;">Sign in to X</h1>
            <p style="font-size:14px;color:var(--secondary-text);margin-bottom:24px;">Use Google to sign in and start posting.</p>
            <button id="google-login" style="width:100%;padding:10px 16px;border-radius:9999px;border:none;font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background-color:var(--text);color:var(--bg);">
                <i class="fa-brands fa-google"></i>
                <span>Sign in with Google</span>
            </button>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
